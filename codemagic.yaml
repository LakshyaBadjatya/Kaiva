workflows:
  ios-sideloadly:
    name: iOS — Sideloadly IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - GOOGLE_SERVICE_INFO_PLIST
      vars:
        BUNDLE_ID: com.lakshya.kaiva
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner

    scripts:
      - name: Write firebase_options.dart
        script: printf '%s' "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart

      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate code (Drift + Riverpod)
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Write GoogleService-Info.plist
        script: printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod install
        script: cd ios && pod install --repo-update

      - name: Build unsigned IPA (for Sideloadly)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/Runner.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            archive

      - name: Export unsigned IPA
        script: |
          PAYLOAD_DIR="$CM_BUILD_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$CM_BUILD_DIR/build/Runner.xcarchive/Products/Applications/Runner.app" "$PAYLOAD_DIR/"
          mkdir -p "$CM_BUILD_DIR/build/ipa"
          cd "$CM_BUILD_DIR" && zip -r "build/ipa/Kaiva-unsigned.ipa" Payload/
          rm -rf "$PAYLOAD_DIR"

    artifacts:
      - build/ipa/Kaiva-unsigned.ipa

    publishing:
      email:
        recipients:
          - lakkudagamer@gmail.com
        notify:
          success: true
          failure: true
